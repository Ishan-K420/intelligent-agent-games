<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Agent Games</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 30px;
        }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            width: 300px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 0 15px rgba(56, 189, 248, 0.2);
            border-color: #38bdf8;
        }
        .card h2 {
            margin-top: 0;
            color: #f1f5f9;
            font-size: 1.5rem;
        }
        .card p {
            color: #cbd5e1;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background-color: #0ea5e9;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        .btn:hover {
            background-color: #0284c7;
        }
    </style>
</head>
<body>
    <h1>Intelligent Agent Games</h1>
    <div class="container">
        <div class="card">
            <h2>Agent Survival</h2>
            <p>A wave-based survival arena exploring the PEAS framework and distinct AI agent architectures.</p>
            <a href="agent-survival/" class="btn">Play Game</a>
        </div>
        <div class="card">
            <h2>AI Maze Battle</h2>
            <p>An interactive maze featuring pathfinding and AI competition.</p>
            <a href="ai-maze-battle/" class="btn">Play Game</a>
        </div>
    </div>
</body>
</html>
